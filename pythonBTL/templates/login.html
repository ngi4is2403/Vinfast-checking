{% extends "layout.html" %}

{% block content %}
<div class="container" style="padding: 4rem 0; display: flex; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 450px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Chào mừng trở lại!</h2>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Đăng nhập</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
            Chưa có tài khoản? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 600;">Đăng ký ngay</a>
        </p>
    </div>
</div>
{% endblock %}
